<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../img/fortaleza.png" type="image/x-icon">
    <title>Download - Politica de Privacidad</title>
</head>
<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: linear-gradient(120deg, #494848da, #ebe8e8, #a8a6a6da,#ebe8e8,#c5c2c2, #494848da,#c5c2c2);
    }

    header {
        text-align: center;
        margin-bottom: 20px;
    }

    main {
        text-align: center;
    }
    p {
        font-size: 1.2em;
        line-height: 1.5;
        margin-bottom: 20px;
    }
    a {
        margin-top: 100px;
        text-decoration: none;
        color: #007BFF;
        font-weight: bold;
        font-size: 1.2em;
        transition: color 0.3s ease;
        margin: 100px;
        border: #0056b3 2px solid;
        padding: 10px;
        border-radius: 5px;
        background-color: #132d49;
    }
    a:hover {
        color: #0056b3; /* Azul oscuro al pasar el mouse */
    }
    /*Animacion estilo movimiento correr mas abajo*/
    .message {
        margin-top: 100px;
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        animation: move 1s infinite alternate;
        font-size: 1.2em;
        font-weight: bold;
        color: #132d49;

    }
    @keyframes move {
        from {
            transform: translateX(0);
        }
        to {
            transform: translateX(-10px);
        }
    }   

    footer {
        margin-top: 20px;
        text-align: center;
        color: #888;
        font-size: 0.9em;
    }

    
</style>
<body>
    <header>
        <h1>Politica de Privacidad</h1>
    </header>
    <main>
        <!-- Enlace para descargar el archivo PDF -->
        <p>Para descargar la Politica de Privacidad, haz clic en el enlace de abajo:</p>
        <a href="Política de Privacidad fortaleza cross.pdf" download>Descargar PDF</a>
        <div class="message" >¡Una vez descargar puedes volver a la pagina anterior!</div>
    </main>
    <footer>
        <p>&copy; 2023 Fortaleza Cross. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
